name: YOLOv5 CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t djjoel/yolov5-detection:latest .
          docker tag djjoel/yolov5-detection:latest djjoel/yolov5-detection:${{ github.sha }}

      - name: Push Docker image
        run: |
          docker push djjoel/yolov5-detection:latest
          docker push djjoel/yolov5-detection:${{ github.sha }}

      - name: Image build success notification
        run: echo "Docker image djjoel/yolov5-detection:latest pushed successfully"
